name: Flutter Build

# This trigger tells GitHub: "Run this every time I push to the main branch"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest # Runs on a fast Linux server in the cloud

    steps:
      # 1. Pull the code from your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java (required for Android builds)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up future builds

      # 4. Get the packages (Supabase, image_picker, etc.)
      - name: Install dependencies
        run: flutter pub get

      # 5. Build the APK
      - name: Build APK
        run: flutter build apk --release

      # 6. Upload the APK so you can download it from GitHub
      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk